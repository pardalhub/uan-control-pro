{% extends 'base.html' %}

{% block conteudo %}

<h2>Novo Produto</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Nome</label>

<input
class="form-control"
name="nome"
value="{{ produto.nome if produto else '' }}"
required>

</div>

<div class="col-md-3 mb-3">

<label>Categoria</label>

<select
class="form-control"
name="categoria">

<option>Hortifruti</option>

<option>Proteínas</option>

<option>Secos</option>

<option>Descartáveis</option>

<option>Limpeza</option>

<option>Bebidas</option>

</select>

</div>

<div class="col-md-3 mb-3">

<label>Unidade</label>

<select
class="form-control"
name="unidade">

<option>Kg</option>

<option>Unidade</option>

<option>Pacote</option>

<option>Caixa</option>

<option>Litro</option>

</select>

</div>

<div class="col-md-4 mb-3">

<div class="col-md-4 mb-3">

<label>Código de Barras</label>

<input
type="text"
class="form-control"
name="codigo_barras"
value="{{ produto.codigo_barras if produto else '' }}">
</div>

</div>

<div class="col-md-4 mb-3">

<label>Fornecedor</label>

<input
class="form-control"
name="fornecedor"
value="{{ produto.fornecedor if produto else '' }}">

</div>

<div class="col-md-4 mb-3">

<label>Localização</label>

<input
class="form-control"
name="localizacao"
value="{{ produto.localizacao if produto else '' }}">

</div>

<div class="col-md-3 mb-3">

<label>Estoque mínimo</label>

<input
type="number"
step="0.01"
class="form-control"
name="estoque_minimo"
value="{{ produto.estoque_minimo if produto else 0 }}">

</div>

<div class="col-md-3 mb-3">

<label>Estoque ideal</label>

<input
type="number"
step="0.01"
class="form-control"
name="estoque_maximo"
value="{{ produto.estoque_maximo if produto else 0 }}">

</div>

<div class="col-md-6 mb-3">

<label>Observações</label>

<input
class="form-control"
name="observacao"
value="{{ produto.observacao if produto else '' }}">

</div>

</div>

<button class="btn btn-success">

Salvar Produto

</button>

</form>

{% endblock %}
