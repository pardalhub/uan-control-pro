{% extends "base.html" %}

{% block conteudo %}

<h2 class="mb-4">

📥 Nova Entrada de Estoque

</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Produto</label>

<select
name="produto"
class="form-select"
required>

{% for p in produtos %}

<option value="{{ p.id }}">

{{ p.nome }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-3 mb-3">

<label class="form-label">

Quantidade

</label>

<input
type="number"
step="0.001"
name="quantidade"
class="form-control"
required>

</div>

<div class="col-md-3 mb-3">

<label class="form-label">

Lote

</label>

<input
type="text"
name="lote"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

Validade

</label>

<input
type="date"
name="validade"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

Fornecedor

</label>

<input
type="text"
name="fornecedor"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

Nota Fiscal

</label>

<input
type="text"
name="nota_fiscal"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

Valor Unitário

</label>

<input
type="number"
step="0.01"
name="valor_unitario"
class="form-control"
value="0">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

Responsável

</label>

<input
type="text"
name="responsavel"
class="form-control">

</div>

<div class="col-md-12 mb-3">

<label class="form-label">

Observação

</label>

<textarea
name="observacao"
class="form-control"
rows="3"></textarea>

</div>

</div>

<button
class="btn btn-success">

Salvar Entrada

</button>

</form>

{% endblock %}
