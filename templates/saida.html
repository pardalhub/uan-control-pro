{% extends "base.html" %}

{% block conteudo %}

<h2 class="mb-4">

📤 Nova Saída de Estoque

</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Produto

</label>

<select
name="produto"
class="form-select"
required>

{% for p in produtos %}

<option value="{{ p.id }}">

{{ p.nome }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-3 mb-3">

<label class="form-label">

Quantidade

</label>

<input
type="number"
step="0.001"
name="quantidade"
class="form-control"
required>

</div>

<div class="col-md-3 mb-3">

<label class="form-label">

Responsável

</label>

<input
type="text"
name="responsavel"
class="form-control">

</div>

<div class="col-md-12 mb-3">

<label class="form-label">

Observação

</label>

<textarea
name="observacao"
rows="3"
class="form-control"></textarea>

</div>

</div>

<button class="btn btn-danger">

Registrar Saída

</button>

</form>

{% endblock %}
